name: Sync Release Notes

on:
  push:
    branches:
      - main
    paths:
      - "docs/releases/*.md"
      - ".github/workflows/sync-release-notes.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update, for example v2.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update release body
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tags="$INPUT_TAG"
          else
            tags="$(find docs/releases -maxdepth 1 -name 'v*.md' -printf '%f\n' | sed 's/\.md$//' | sort)"
          fi

          for tag in $tags; do
            notes="docs/releases/${tag}.md"
            if [ ! -f "$notes" ]; then
              echo "Release notes not found: $notes" >&2
              exit 1
            fi
            if ! gh release view "$tag" >/dev/null 2>&1; then
              echo "Release not found, skipping: $tag"
              continue
            fi
            gh release edit "$tag" \
              --title "fake-ui ${tag}" \
              --notes-file "$notes"
          done
