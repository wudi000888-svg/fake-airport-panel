name: Sync Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update, for example v2.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update release body
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          notes="docs/releases/${TAG}.md"
          if [ ! -f "$notes" ]; then
            echo "Release notes not found: $notes" >&2
            exit 1
          fi
          gh release edit "$TAG" \
            --title "fake-ui ${TAG}" \
            --notes-file "$notes"
