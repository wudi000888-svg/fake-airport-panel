name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release notes
        id: notes
        run: |
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes" ]; then
            notes="README.md"
          fi
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Build source archive
        run: |
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="fake-ui-${GITHUB_REF_NAME}/" \
            -o "dist/fake-ui-${GITHUB_REF_NAME}.tar.gz" \
            "$GITHUB_SHA"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/fake-ui-${GITHUB_REF_NAME}.tar.gz" \
            --title "fake-ui ${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            --latest \
            --verify-tag
